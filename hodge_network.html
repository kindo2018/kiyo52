<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>離散ホッジ分解 ネットワークシミュレータ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #111318;
    --border: #1e2330;
    --accent: #4af0c4;
    --grad: #f06060;
    --curl: #6090f0;
    --harm: #f0c040;
    --text: #c8d0e0;
    --dim: #4a5268;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 1fr 360px;
    grid-template-areas: "header header" "canvas sidebar";
    gap: 0;
  }

  header {
    grid-area: header;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  header p {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  #canvas-area {
    grid-area: canvas;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #sidebar {
    grid-area: sidebar;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.danger:hover { border-color: var(--grad); color: var(--grad); }

  .mode-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-top: 8px;
    min-height: 16px;
  }

  /* Edge list */
  #edge-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  #edge-list::-webkit-scrollbar { width: 4px; }
  #edge-list::-webkit-scrollbar-track { background: var(--bg); }
  #edge-list::-webkit-scrollbar-thumb { background: var(--border); }

  .edge-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 6px;
    padding: 6px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .edge-item:hover { background: var(--panel); }

  .edge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
  }

  .edge-cost-input {
    width: 60px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 6px;
    text-align: right;
  }

  .edge-cost-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .del-btn {
    padding: 2px 6px;
    font-size: 10px;
    border-color: transparent;
    color: var(--dim);
  }

  /* Result panel */
  #results {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    max-height: 260px;
    overflow-y: auto;
  }

  #results::-webkit-scrollbar { width: 4px; }
  #results::-webkit-scrollbar-thumb { background: var(--border); }

  .result-block {
    margin-bottom: 14px;
  }

  .result-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .result-title.grad { color: var(--grad); }
  .result-title.curl { color: var(--curl); }
  .result-title.harm { color: var(--harm); }

  .result-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    padding: 1px 0;
  }

  .result-val { color: var(--text); }

  .energy-bar-wrap {
    margin-top: 10px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
  }

  .energy-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .energy-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    width: 36px;
    color: var(--dim);
  }

  .energy-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    position: relative;
  }

  .energy-bar-fill {
    height: 100%;
    transition: width 0.4s ease;
  }

  .energy-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    width: 36px;
    text-align: right;
    color: var(--dim);
  }

  .tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
    display: none;
  }

  #laplacian-wrap {
    overflow-y: auto;
    max-height: 220px;
  }
  #laplacian-wrap::-webkit-scrollbar { width: 4px; }
  #laplacian-wrap::-webkit-scrollbar-thumb { background: var(--border); }

  #help-text {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.7;
  }

  #braess-panel b {
    font-weight: 600;
  }

  .braess-btn-before {
    border-color: #f0c040 !important;
    color: #f0c040 !important;
  }
  .braess-btn-after {
    border-color: #f06060 !important;
    color: #f06060 !important;
  }
</style>
</head>
<body>

<header>
  <h1>離散ホッジ分解シミュレータ</h1>
  <p>有向ネットワーク上の flow = grad成分 ⊕ curl成分 ⊕ 調和成分</p>
</header>

<div id="canvas-area">
  <canvas id="c"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>

<div id="sidebar">
  <div class="section">
    <div class="section-title">モード</div>
    <div class="btn-row">
      <button id="btn-add-node" class="active" onclick="setMode('node')">ノード追加</button>
      <button id="btn-add-edge" onclick="setMode('edge')">枝追加</button>
      <button id="btn-move" onclick="setMode('move')">移動</button>
      <button id="btn-delete" class="danger" onclick="setMode('delete')">削除</button>
    </div>
    <div class="mode-indicator" id="mode-label">クリックでノードを追加</div>
  </div>

  <div class="section">
    <div class="section-title">プリセット</div>
    <div class="btn-row">
      <button onclick="loadPreset('triangle')">三角形</button>
      <button onclick="loadPreset('grid')">格子</button>
      <button onclick="loadPreset('cycle')">多重サイクル</button>
      <button onclick="clearAll()">クリア</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button onclick="loadPreset('braess_before')" style="border-color:#f0c040;color:#f0c040;">Braess（枝追加前）</button>
      <button onclick="loadPreset('braess_after')" style="border-color:#f06060;color:#f06060;">Braess（枝追加後）</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button onclick="loadPreset('allais_q1_B')" style="border-color:#a0d0ff;color:#a0d0ff;">アレQ1・B選択者</button>
      <button onclick="loadPreset('allais_q1_A')" style="border-color:#ffa0a0;color:#ffa0a0;">アレQ1・A選択者</button>
    </div>
  </div>

  <div id="braess-panel" style="display:none;padding:10px 18px;border-bottom:1px solid var(--border);background:#0d1018;">
    <div class="section-title" style="margin-bottom:6px;color:#f0c040;">Braessパラドックス</div>
    <div id="braess-text" style="font-size:10px;color:var(--dim);line-height:1.8;"></div>
    <div id="braess-cost" style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;"></div>
  </div>

  <div class="section" style="padding-bottom:8px;">
    <div class="section-title">枝一覧（フロー = ホッジ分解の対象 / 費用 = 黄色）</div>
  </div>
  <div id="edge-list"></div>

  <div id="results">
    <div class="section-title" style="margin-bottom:10px;">ホッジ分解結果</div>
    <div id="result-content"><span style="font-size:11px;color:var(--dim);">枝を追加すると分解が表示されます</span></div>
  </div>

  <div class="energy-bar-wrap">
    <div class="section-title" style="margin-bottom:8px;">エネルギー比率 ‖·‖²</div>
    <div class="energy-row">
      <span class="energy-label" style="color:var(--grad)">grad</span>
      <div class="energy-bar-bg"><div class="energy-bar-fill" id="bar-grad" style="background:var(--grad);width:0%"></div></div>
      <span class="energy-pct" id="pct-grad">—</span>
    </div>
    <div class="energy-row">
      <span class="energy-label" style="color:var(--curl)">curl</span>
      <div class="energy-bar-bg"><div class="energy-bar-fill" id="bar-curl" style="background:var(--curl);width:0%"></div></div>
      <span class="energy-pct" id="pct-curl">—</span>
    </div>
    <div class="energy-row">
      <span class="energy-label" style="color:var(--harm)">harm</span>
      <div class="energy-bar-bg"><div class="energy-bar-fill" id="bar-harm" style="background:var(--harm);width:0%"></div></div>
      <span class="energy-pct" id="pct-harm">—</span>
    </div>
  </div>

  <div id="laplacian-wrap" style="border-top:1px solid var(--border);padding:12px 18px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="section-title" style="margin-bottom:0;">ラプラシアン L = B Bᵀ</div>
      <div style="display:flex;gap:6px;">
        <button id="btn-show-L"  onclick="setMatView('L')"  style="font-size:9px;padding:3px 7px;" class="active">L</button>
        <button id="btn-show-B"  onclick="setMatView('B')"  style="font-size:9px;padding:3px 7px;">B</button>
        <button id="btn-show-phi" onclick="setMatView('phi')" style="font-size:9px;padding:3px 7px;">φ</button>
      </div>
    </div>
    <div id="mat-subtitle" style="font-size:9px;color:var(--dim);margin-bottom:6px;font-family:'JetBrains Mono',monospace;"></div>
    <div id="mat-display" style="overflow-x:auto;">
      <span style="font-size:11px;color:var(--dim)">枝を追加すると表示されます</span>
    </div>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────
let nodes = [];   // {id, x, y, label}
let edges = [];   // {id, src, dst, flow, revFlow}
let nodeId = 0, edgeId = 0;
let mode = 'node';
let edgeSrc = null;
let dragging = null, dragOffX = 0, dragOffY = 0;
let decomp = null; // last decomposition result

// ─── Canvas setup ──────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

function resize() {
  const area = document.getElementById('canvas-area');
  canvas.width = area.clientWidth * devicePixelRatio;
  canvas.height = area.clientHeight * devicePixelRatio;
  canvas.style.width = area.clientWidth + 'px';
  canvas.style.height = area.clientHeight + 'px';
  draw();
}
window.addEventListener('resize', resize);

// ─── Mode ──────────────────────────────────────────────
const modeLabels = {
  node: 'クリックでノードを追加',
  edge: 'ノードをクリックして枝の始点→終点を選択',
  move: 'ノードをドラッグして移動',
  delete: 'ノード/枝をクリックして削除'
};

function setMode(m) {
  mode = m; edgeSrc = null;
  document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m)?.classList.add('active');
  document.getElementById('mode-label').textContent = modeLabels[m];
  draw();
}

// ─── Math helpers ──────────────────────────────────────
function mat(rows, cols, fill=0) {
  return Array.from({length:rows}, ()=>new Array(cols).fill(fill));
}

function matMul(A, B) {
  const r=A.length, k=B.length, c=B[0].length;
  const C=mat(r,c);
  for(let i=0;i<r;i++) for(let j=0;j<c;j++) for(let l=0;l<k;l++) C[i][j]+=A[i][l]*B[l][j];
  return C;
}

function matTrans(A) {
  return A[0].map((_,j)=>A.map(row=>row[j]));
}

// Conjugate Gradient for symmetric positive semidefinite systems
// Solve Ax = b with minimum-norm solution (project out null space via pinv approach)
function leastNormCG(A, b, tol=1e-9, maxIter=2000) {
  const n = b.length;
  const x = new Array(n).fill(0);
  const r = b.map((v,i) => v - A[i].reduce((s,a,j)=>s+a*x[j],0));
  const p = [...r];
  let rsold = r.reduce((s,v)=>s+v*v,0);
  for(let iter=0;iter<maxIter;iter++){
    if(Math.sqrt(rsold)<tol) break;
    const Ap = A.map(row=>row.reduce((s,a,j)=>s+a*p[j],0));
    const alpha = rsold / p.reduce((s,v,j)=>s+v*Ap[j],0);
    for(let i=0;i<n;i++){ x[i]+=alpha*p[i]; r[i]-=alpha*Ap[i]; }
    const rsnew = r.reduce((s,v)=>s+v*v,0);
    const beta = rsnew/rsold;
    for(let i=0;i<n;i++) p[i]=r[i]+beta*p[i];
    rsold=rsnew;
  }
  return x;
}

// ─── Hodge Decomposition ───────────────────────────────
// flow vector: each edge e has two entries [forward, reverse]
// We treat each directed edge as independent.
// The signed incidence matrix B: B[v][e] = +1 if e starts at v, -1 if e ends at v
// grad(phi) = B^T phi  (for edge e: phi[dst] - phi[src])
// div(f) = B f
// curl: for each triangle (i,j,k), curl = sum of flows around cycle
// Decompose f = B^T phi + delta^* psi + H
// where delta^* = curl^T for triangle-based curl

function hodge() {
  const E = edges.length;
  if(E === 0) { decomp = null; updateResults(); return; }

  const N = nodes.length;
  const nIdx = {}; nodes.forEach((n,i)=>nIdx[n.id]=i);
  const f = edges.map(e => e.flow);

  // ── Boundary operator B: N x E ──────────────────────
  // B[v][e] = -1 if e leaves v, +1 if e enters v
  const B = mat(N, E);
  edges.forEach((e,j)=>{
    const si=nIdx[e.src], di=nIdx[e.dst];
    if(si!==undefined) B[si][j] -= 1;
    if(di!==undefined) B[di][j] += 1;
  });
  const Bt = matTrans(B);

  // ── 2-chain operator: triangles or cycle basis ───────
  // For triangles (2-simplices): D1 is triangle boundary operator.
  // For pure graphs: use fundamental cycle basis.
  // Either way we get a matrix C (K x E) whose rows span
  // the subspace we call "curl space".
  const triangles = findOrientedTriangles();
  let C; // K x E
  if(triangles.length > 0) {
    C = mat(triangles.length, E);
    triangles.forEach(({a,b,c}, t) => {
      // boundary of triangle a→b→c→a
      const triEdges = [[a,b,1],[b,c,1],[c,a,1]];
      triEdges.forEach(([u,v,s]) => {
        edges.forEach((e,j) => {
          const si=nIdx[e.src], di=nIdx[e.dst];
          if(si===u&&di===v) C[t][j]+=s;
          else if(si===v&&di===u) C[t][j]-=s;
        });
      });
    });
  } else {
    const cyc = findCycleBasis();
    C = cyc.length > 0 ? cyc : mat(0, E);
  }
  const K = C.length;
  const Ct = K > 0 ? matTrans(C) : mat(E, 0);

  // ── Build combined projection matrix ─────────────────
  // We want to decompose f = f_grad + f_curl + f_harm
  // where:
  //   f_grad ∈ im(B^T)
  //   f_curl ∈ im(C^T)  [and ⊥ im(B^T)]
  //   f_harm ⊥ im(B^T) and ⊥ im(C^T)
  //
  // Method: build the combined basis matrix G = [B^T | C^T]
  // (each column is a basis vector), then solve the normal equations.
  //
  // Step 1: project f onto im(B^T) via Laplacian solve
  //   L phi = B f,  f_grad = B^T phi
  const L = mat(N,N);
  for(let i=0;i<N;i++) for(let j=0;j<N;j++)
    for(let k=0;k<E;k++) L[i][j] += B[i][k]*B[j][k];
  const divF = B.map(row=>row.reduce((s,v,j)=>s+v*f[j],0));
  const Lpin = L.map(r=>[...r]);
  const divFpin = [...divF];
  for(let j=0;j<N;j++) Lpin[0][j]=0;
  Lpin[0][0]=1; divFpin[0]=0;
  const phi = leastNormCG(Lpin, divFpin);
  const fGrad = edges.map((e,j)=>{
    const si=nIdx[e.src], di=nIdx[e.dst];
    return (phi[di]||0)-(phi[si]||0);
  });

  // Step 2: project residual r = f - f_grad onto im(C^T)
  // BUT we must ensure C^T is orthogonal to im(B^T).
  // Orthogonalize each row of C against im(B^T) first (Gram-Schmidt step):
  //   c_k' = c_k - B^T (L^+) B c_k
  // i.e. remove the grad-projection from each cycle vector.
  let fCurl = new Array(E).fill(0);
  if(K > 0) {
    // Orthogonalize C rows against im(B^T)
    const Corth = C.map(cyc => {
      // Project cyc onto im(B^T): solve L phi_c = B cyc, then subtract B^T phi_c
      const Bcyc = B.map(row=>row.reduce((s,v,j)=>s+v*cyc[j],0));
      const Lpin2 = L.map(r=>[...r]);
      const bp2 = [...Bcyc];
      for(let j=0;j<N;j++) Lpin2[0][j]=0;
      Lpin2[0][0]=1; bp2[0]=0;
      const phi_c = leastNormCG(Lpin2, bp2);
      return cyc.map((v,j)=>{
        const si=nIdx[edges[j].src], di=nIdx[edges[j].dst];
        return v - ((phi_c[di]||0)-(phi_c[si]||0));
      });
    });

    // Project r = f - f_grad onto im(Corth^T)
    const r = f.map((v,j)=>v-fGrad[j]);
    const CorthT = matTrans(Corth);
    const Cr = Corth.map(row=>row.reduce((s,v,j)=>s+v*r[j],0));
    const CCtorth = mat(K,K);
    for(let i=0;i<K;i++) for(let j2=0;j2<K;j2++)
      for(let k=0;k<E;k++) CCtorth[i][j2]+=Corth[i][k]*Corth[j2][k];
    for(let i=0;i<K;i++) CCtorth[i][i]+=1e-10;
    const psi = leastNormCG(CCtorth, Cr);
    fCurl = CorthT.map(row=>row.reduce((s,v,j)=>s+v*psi[j],0));
  }

  // Step 3: harmonic = remainder
  const fHarm = f.map((v,j)=>v-fGrad[j]-fCurl[j]);

  const energy = v=>v.reduce((s,x)=>s+x*x,0);
  const eTotal=energy(f), eGrad=energy(fGrad),
        eCurl=energy(fCurl), eHarm=energy(fHarm);

  decomp = { f, fGrad, fCurl, fHarm, phi, triangles,
             eTotal, eGrad, eCurl, eHarm, L, B };
  updateResults();
  draw();
}

// ─── Find oriented triangles (2-simplices) ─────────────
// Returns triangles with canonical orientation a<b<c (by node index).
// Only counts triangles where all three pairs have at least one edge.
function findOrientedTriangles() {
  const N = nodes.length;
  const nIdx = {}; nodes.forEach((n,i) => nIdx[n.id] = i);
  // undirected adjacency
  const adj = Array.from({length:N}, () => new Set());
  edges.forEach(e => {
    const si=nIdx[e.src], di=nIdx[e.dst];
    if(si!==undefined && di!==undefined){ adj[si].add(di); adj[di].add(si); }
  });
  const tris = [];
  for(let a=0;a<N;a++) for(let b=a+1;b<N;b++) if(adj[a].has(b))
    for(let c=b+1;c<N;c++) if(adj[a].has(c) && adj[b].has(c))
      tris.push({a,b,c});
  return tris;
}

// ─── Cycle space basis via spanning tree ───────────────
// For an undirected graph with N nodes and E edges,
// β1 = E - N + components fundamental cycles.
// Each non-tree edge (u,v) defines a fundamental cycle:
// the unique tree path from u to v, plus the edge (u,v).
// We encode each cycle as a signed vector over edges:
//   +1 if edge is traversed in its directed orientation
//   -1 if traversed against its directed orientation
function findCycleBasis() {
  const N = nodes.length;
  const E = edges.length;
  if(N === 0 || E === 0) return [];

  const nIdx = {}; nodes.forEach((n,i) => nIdx[n.id] = i);

  // Build undirected adjacency for spanning tree (BFS)
  // adj[u] = [{v, edgeIdx, forward}]
  const adj = Array.from({length:N}, ()=>[]);
  edges.forEach((e,j)=>{
    const si = nIdx[e.src], di = nIdx[e.dst];
    if(si===undefined||di===undefined) return;
    adj[si].push({v:di, j, forward:true});
    adj[di].push({v:si, j, forward:false});
  });

  // BFS spanning tree — track parent and which edge was used
  const parent = new Array(N).fill(-1);
  const parentEdge = new Array(N).fill(-1);
  const parentFwd  = new Array(N).fill(true);
  const visited = new Array(N).fill(false);
  const treeEdges = new Set();
  const components = [];

  for(let start=0; start<N; start++){
    if(visited[start]) continue;
    const comp = [];
    const queue = [start];
    visited[start] = true;
    while(queue.length){
      const u = queue.shift();
      comp.push(u);
      for(const {v,j,forward} of adj[u]){
        if(!visited[v]){
          visited[v]=true;
          parent[v]=u;
          parentEdge[v]=j;
          parentFwd[v]=forward;
          treeEdges.add(j);
          queue.push(v);
        }
      }
    }
    components.push(comp);
  }

  // Helper: get signed path from u to v in spanning tree
  // Returns array of {j, sign} where sign=+1 means edge j traversed forward
  function treePath(u, v) {
    // Find ancestors of u and v
    const pathU = [], pathV = [];
    let a=u, b=v;
    const depthU={}, depthV={};
    let du=0, dv=0;
    // collect full paths to root
    let x=u; while(x!==-1){depthU[x]=du++; pathU.push(x); x=parent[x];}
    let y=v; while(y!==-1){depthV[y]=dv++; pathV.push(y); y=parent[y];}
    // find LCA
    let lca=-1;
    for(const node of pathU){ if(depthV[node]!==undefined){lca=node;break;} }
    if(lca===-1) return null; // different components — shouldn't happen

    // path from u up to lca
    const segs = [];
    let cur=u;
    while(cur!==lca){
      const j=parentEdge[cur], fwd=parentFwd[cur];
      // parentFwd[cur]=true means edge goes parent→cur, so traversing cur→parent = backward
      segs.push({j, sign: fwd ? -1 : +1});
      cur=parent[cur];
    }
    // path from lca down to v (reverse of v→lca)
    const downPath=[];
    cur=v;
    while(cur!==lca){
      const j=parentEdge[cur], fwd=parentFwd[cur];
      // traversing parent→cur = forward direction of edge if fwd=true
      downPath.push({j, sign: fwd ? +1 : -1});
      cur=parent[cur];
    }
    downPath.reverse();
    return segs.concat(downPath);
  }

  // For each non-tree edge, build the fundamental cycle vector
  const cycles = [];
  edges.forEach((e,j)=>{
    if(treeEdges.has(j)) return;
    const si=nIdx[e.src], di=nIdx[e.dst];
    if(si===undefined||di===undefined) return;
    // cycle = tree path from dst back to src, then edge j forward
    const path = treePath(di, si);
    if(!path) return;
    const cyc = new Array(E).fill(0);
    path.forEach(({j:pj, sign})=>{ cyc[pj]+=sign; });
    cyc[j] += 1; // the non-tree edge itself, traversed forward (src→dst)
    cycles.push(cyc);
  });

  return cycles;
}

// ─── Presets ───────────────────────────────────────────
function clearAll() {
  nodes=[]; edges=[]; nodeId=0; edgeId=0;
  decomp=null; edgeSrc=null;
  updateEdgeList(); updateResults(); draw();
}

function loadPreset(name) {
  clearAll();
  const W = canvas.width/devicePixelRatio, H = canvas.height/devicePixelRatio;
  const cx=W/2, cy=H/2;

  document.getElementById('braess-panel').style.display='none';

  if(name==='triangle'){
    const r=120;
    for(let i=0;i<3;i++){
      const a=(-Math.PI/2)+i*2*Math.PI/3;
      addNode(cx+r*Math.cos(a), cy+r*Math.sin(a));
    }
    addEdge(nodes[0].id,nodes[1].id,3);
    addEdge(nodes[1].id,nodes[2].id,1);
    addEdge(nodes[2].id,nodes[0].id,2);
    addEdge(nodes[0].id,nodes[2].id,4);
  }
  else if(name==='grid'){
    const sp=100, ox=cx-sp, oy=cy-sp;
    for(let r=0;r<3;r++) for(let c=0;c<3;c++) addNode(ox+c*sp, oy+r*sp);
    const g=(r,c)=>nodes[r*3+c].id;
    const flows=[[2,1,3],[1,4,2],[3,2,1],[-1,2,-2],[-3,1,2]];
    let fi=0;
    for(let r=0;r<3;r++) for(let c=0;c<2;c++) addEdge(g(r,c),g(r,c+1),flows[fi++%flows.length][c]);
    for(let r=0;r<2;r++) for(let c=0;c<3;c++) addEdge(g(r,c),g(r+1,c),(r+c)%3+1);
  }
  else if(name==='cycle'){
    const r1=140, r2=70;
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*2*Math.PI/5;
      addNode(cx+r1*Math.cos(a), cy+r1*Math.sin(a));
    }
    for(let i=0;i<3;i++){
      const a=-Math.PI/2+i*2*Math.PI/3;
      addNode(cx+r2*Math.cos(a), cy+r2*Math.sin(a));
    }
    for(let i=0;i<5;i++) addEdge(nodes[i].id, nodes[(i+1)%5].id, (i%3)+1);
    for(let i=0;i<3;i++) addEdge(nodes[5+i].id, nodes[5+(i+1)%3].id, 2);
    addEdge(nodes[0].id,nodes[5].id,1);
    addEdge(nodes[2].id,nodes[6].id,3);
    addEdge(nodes[4].id,nodes[7].id,2);
  }

  // ── Braess paradox ──────────────────────────────────
  // Wardrop均衡フローでモデル化。
  // 各枝の費用関数: c(f) = t0 + alpha*f
  // ノード: S(出発), A, B, T(到着)
  // 枝追加前: S→A(c=f), A→T(c=1), S→B(c=1), B→T(c=f)
  //   均衡: 各経路に0.5ずつ → 経路コスト1.5
  // 枝追加後: A→B(c=0)を追加
  //   均衡: 全員S→A→B→T → 経路コスト2.0（悪化）
  else if(name==='braess_before' || name==='braess_after'){
    const isBefore = name==='braess_before';
    // layout: S左, A上, B下, T右
    const S = addNode(cx-160, cy, 'S');
    const A = addNode(cx,     cy-100, 'A');
    const B = addNode(cx,     cy+100, 'B');
    const Tn= addNode(cx+160, cy, 'T');

    if(isBefore){
      // 費用関数: S→A: c=f, A→T: c=1, S→B: c=1, B→T: c=f
      // 均衡フロー: 各経路0.5
      addEdge(S.id, A.id,  0.5, 0.5); // flow=0.5, cost=f(0.5)=0.5
      addEdge(A.id, Tn.id, 0.5, 1.0); // flow=0.5, cost=1（定数）
      addEdge(S.id, B.id,  0.5, 1.0); // flow=0.5, cost=1（定数）
      addEdge(B.id, Tn.id, 0.5, 0.5); // flow=0.5, cost=f(0.5)=0.5
    } else {
      // 費用関数: S→A: c=f, A→B: c=0, B→T: c=f, S→B: c=1, A→T: c=1
      // 均衡フロー: 全員S→A→B→T
      addEdge(S.id, A.id,  1.0, 1.0); // flow=1, cost=f(1)=1
      addEdge(A.id, B.id,  1.0, 0.0); // flow=1, cost=0（ゼロコスト枝）
      addEdge(B.id, Tn.id, 1.0, 1.0); // flow=1, cost=f(1)=1
      addEdge(S.id, B.id,  0.0, 1.0); // flow=0（未使用）, cost=1
      addEdge(A.id, Tn.id, 0.0, 1.0); // flow=0（未使用）, cost=1
    }

    updateEdgeList(); hodge();

    // Show Braess panel
    document.getElementById('braess-panel').style.display='block';
    const bp = document.getElementById('braess-text');
    const bc = document.getElementById('braess-cost');

    if(isBefore){
      bp.innerHTML =
        '枝構成: S→A（費用=f）, A→T（費用=1）<br>'+
        '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;S→B（費用=1）, B→T（費用=f）<br><br>'+
        'Wardrop均衡: 各経路に <b style="color:#f0c040">0.5</b> ずつ配分<br>'+
        '経路S→A→T: 0.5 + 1 = <b style="color:#f0c040">1.5</b><br>'+
        '経路S→B→T: 1 + 0.5 = <b style="color:#f0c040">1.5</b>';
      bc.innerHTML =
        '<span style="color:#4af0c4">均衡コスト = 1.5</span><br>'+
        '<span style="color:var(--dim);font-size:9px">調和成分 = 0（サイクルなし）</span>';
    } else {
      bp.innerHTML =
        '枝A→B（費用=0）を<b style="color:#f06060">追加</b>！<br><br>'+
        '新均衡: 全員がS→A→B→Tを選択<br>'+
        '費用: f(1)+0+f(1) = 1+0+1 = <b style="color:#f06060">2.0</b><br><br>'+
        '<b style="color:#f06060">コストが1.5→2.0に増加！</b><br><br>'+
        'β₁: 1→2（サイクル空間が拡大）<br>'+
        'harm成分に新サイクルが出現';
      bc.innerHTML =
        '<span style="color:#f06060">均衡コスト = 2.0 (+33%悪化)</span><br>'+
        '<span style="color:var(--dim);font-size:9px">harm ≠ 0（新サイクル = 大域的障害）</span>';
    }
    draw();
    return;
  }

  // ── アレのパラドックス Q1 リグレット格子 ──────────────
  // ノード：3結果 400（アタリ）, 300（確実）, 0（ハズレ）
  // 有向枝：C1～C4の平均懸念強度（5件法：1=大変気になる〜5=ほとんど気にしない）
  // 犬童(2013,2014,2026) 実験データ N=116 より推定
  //
  // B選択者(N=79):
  //   C1: 400→300  (A.400 vs B.300)  平均≈2.9（反事実・安堵）
  //   C2: 0→300    (A.0   vs B.300)  平均≈1.8（ハズレ後の後悔・強い）
  //   C3: 300→400  (B.300 vs A.400)  平均≈2.3（反事実リグレット）
  //   C4: 300→0    (B.300 vs A.0)    平均≈3.8（シャーデンフロイデ・弱い）
  // ホロノミー: C1-C3≠0, C4-C2≠0 → H1≠0（平坦でない）
  //
  // A選択者(N=36):
  //   C1: 400→300  平均≈3.2（勝ち組・気にしない）
  //   C2: 0→300    平均≈2.1（ハズレ後の後悔）
  //   C3: 300→400  平均≈2.0（B選択者の反事実・気になる）
  //   C4: 300→0    平均≈3.5（B視点のシャーデン）
  else if(name==='allais_q1_B' || name==='allais_q1_A'){
    const isB = name==='allais_q1_B';

    // レイアウト：三角形（400上, 300右下, 0左下）
    const r=130;
    const n400 = addNode(cx,        cy-r,       '400');
    const n300 = addNode(cx+r*0.87, cy+r*0.5,   '300');
    const n0   = addNode(cx-r*0.87, cy+r*0.5,   '0');

    if(isB){
      // B選択者の懸念フロー（犬童データ推定値）
      addEdge(n400.id, n300.id, 2.9);  // C1: A.400 vs B.300
      addEdge(n0.id,   n300.id, 1.8);  // C2: A.0   vs B.300（強い後悔）
      addEdge(n300.id, n400.id, 2.3);  // C3: B.300 vs A.400（反事実リグレット）
      addEdge(n300.id, n0.id,   3.8);  // C4: B.300 vs A.0  （シャーデンフロイデ）
    } else {
      // A選択者の懸念フロー
      addEdge(n400.id, n300.id, 3.2);  // C1
      addEdge(n0.id,   n300.id, 2.1);  // C2
      addEdge(n300.id, n400.id, 2.0);  // C3
      addEdge(n300.id, n0.id,   3.5);  // C4
    }

    updateEdgeList(); hodge();

    document.getElementById('braess-panel').style.display='block';
    const bp = document.getElementById('braess-text');
    const bc = document.getElementById('braess-cost');

    const holonomy_C1C3 = isB ? (2.9-2.3).toFixed(2) : (3.2-2.0).toFixed(2);
    const holonomy_C4C2 = isB ? (3.8-1.8).toFixed(2) : (3.5-2.1).toFixed(2);
    const col = isB ? '#a0d0ff' : '#ffa0a0';
    const N = isB ? 79 : 36;
    const sel = isB ? 'B（確実）選択者' : 'A（クジ）選択者';

    bp.innerHTML =
      `<b style="color:${col}">Q1 ${sel}（N=${N}）</b><br>`+
      '枝フロー = 平均懸念強度（1強〜5弱）<br><br>'+
      'ノード：400（アタリ）, 300（確実）, 0（ハズレ）<br>'+
      'C1: 400→300（A.400 vs B.300）<br>'+
      'C2: 0→300　（A.0   vs B.300）<br>'+
      'C3: 300→400（B.300 vs A.400）<br>'+
      'C4: 300→0　（B.300 vs A.0）';
    bc.innerHTML =
      `<span style="color:${col}">ホロノミー C1−C3 = ${holonomy_C1C3}</span><br>`+
      `<span style="color:${col}">ホロノミー C4−C2 = ${holonomy_C4C2}</span><br>`+
      `<span style="color:var(--dim);font-size:9px">`+
      (Math.abs(parseFloat(holonomy_C1C3))>0.1||Math.abs(parseFloat(holonomy_C4C2))>0.1
        ? 'ホロノミー≠0 → H¹≠0（認知空間は平坦でない）'
        : 'ホロノミー≈0 → H¹≈0（認知空間は平坦）')+
      '</span>';

    draw();
    return;
  }

  // Hide Braess panel for other presets
  document.getElementById('braess-panel').style.display='none';

  updateEdgeList(); hodge(); draw();
}

// ─── Node / Edge helpers ───────────────────────────────
function addNode(x, y, customLabel) {
  const label = customLabel || String.fromCharCode(65 + (nodes.length % 26));
  nodes.push({id: ++nodeId, x, y, label});
  return nodes[nodes.length-1];
}

function addEdge(src, dst, flow=1, cost=null) {
  edges.push({id: ++edgeId, src, dst, flow, cost: cost ?? flow});
  return edges[edges.length-1];
}

function hitNode(x, y) {
  const R=18;
  return nodes.find(n=>Math.hypot(n.x-x,n.y-y)<R);
}

function hitEdge(x, y) {
  for(const e of edges){
    const sn=nodes.find(n=>n.id===e.src), dn=nodes.find(n=>n.id===e.dst);
    if(!sn||!dn) continue;
    const dx=dn.x-sn.x, dy=dn.y-sn.y, len=Math.hypot(dx,dy);
    if(len<1) continue;
    const t=((x-sn.x)*dx+(y-sn.y)*dy)/(len*len);
    if(t<0||t>1) continue;
    const px=sn.x+t*dx-x, py=sn.y+t*dy-y;
    if(Math.hypot(px,py)<8) return e;
  }
  return null;
}

// ─── Canvas events ─────────────────────────────────────
function canvasXY(e) {
  const rect=canvas.getBoundingClientRect();
  return [(e.clientX-rect.left),(e.clientY-rect.top)];
}

canvas.addEventListener('mousedown', e=>{
  const [x,y]=canvasXY(e);
  if(mode==='node'){
    if(!hitNode(x,y)){ addNode(x,y); updateEdgeList(); hodge(); draw(); }
  }
  else if(mode==='edge'){
    const n=hitNode(x,y);
    if(n){
      if(!edgeSrc){ edgeSrc=n; draw(); }
      else if(edgeSrc.id!==n.id){
        addEdge(edgeSrc.id,n.id,1);
        edgeSrc=null;
        updateEdgeList(); hodge(); draw();
      }
    } else { edgeSrc=null; draw(); }
  }
  else if(mode==='move'){
    const n=hitNode(x,y);
    if(n){ dragging=n; dragOffX=x-n.x; dragOffY=y-n.y; }
  }
  else if(mode==='delete'){
    const n=hitNode(x,y);
    if(n){
      nodes=nodes.filter(v=>v.id!==n.id);
      edges=edges.filter(e=>e.src!==n.id&&e.dst!==n.id);
      updateEdgeList(); hodge(); draw(); return;
    }
    const ed=hitEdge(x,y);
    if(ed){
      edges=edges.filter(e=>e.id!==ed.id);
      updateEdgeList(); hodge(); draw();
    }
  }
});

canvas.addEventListener('mousemove', e=>{
  const [x,y]=canvasXY(e);
  if(dragging){
    dragging.x=x-dragOffX; dragging.y=y-dragOffY;
    hodge(); draw();
  }
  // tooltip on edge hover
  const ed=hitEdge(x,y);
  if(ed&&decomp){
    const j=edges.indexOf(ed);
    const sn=nodes.find(n=>n.id===ed.src), dn=nodes.find(n=>n.id===ed.dst);
    tooltip.style.display='block';
    tooltip.style.left=(x+14)+'px'; tooltip.style.top=(y-10)+'px';
    tooltip.innerHTML=
      `${sn?.label}→${dn?.label} | flow=${decomp.f[j].toFixed(2)}  cost=${(ed.cost??ed.flow).toFixed(2)}<br>`+
      `grad=${decomp.fGrad[j].toFixed(2)}  curl=${decomp.fCurl[j].toFixed(2)}  harm=${decomp.fHarm[j].toFixed(2)}`;
  } else { tooltip.style.display='none'; }
});

canvas.addEventListener('mouseup', ()=>{ dragging=null; });
canvas.addEventListener('mouseleave', ()=>{ dragging=null; tooltip.style.display='none'; });

// ─── Edge list UI ──────────────────────────────────────
function updateEdgeList() {
  const el=document.getElementById('edge-list');
  if(edges.length===0){ el.innerHTML='<div style="padding:12px 18px;font-size:11px;color:var(--dim)">まだ枝がありません</div>'; return; }
  // Header
  el.innerHTML=`<div style="display:grid;grid-template-columns:1fr 58px 58px auto;gap:6px;padding:4px 18px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);border-bottom:1px solid var(--border)">
    <span>枝</span><span style="text-align:right">フロー</span><span style="text-align:right">費用</span><span></span></div>`;
  edges.forEach(e=>{
    const sn=nodes.find(n=>n.id===e.src), dn=nodes.find(n=>n.id===e.dst);
    const div=document.createElement('div');
    div.className='edge-item';
    div.style.gridTemplateColumns='1fr 58px 58px auto';
    div.innerHTML=`
      <span class="edge-label">${sn?.label||'?'}→${dn?.label||'?'}</span>
      <input class="edge-flow-input edge-cost-input" type="number" step="0.5" value="${e.flow}" data-id="${e.id}" title="フロー（ホッジ分解の対象）">
      <input class="edge-costval-input edge-cost-input" type="number" step="0.5" value="${e.cost??e.flow}" data-id="${e.id}" title="費用（表示用）" style="color:var(--harm)">
      <button class="del-btn danger" data-id="${e.id}">✕</button>`;
    el.appendChild(div);
  });
  el.querySelectorAll('.edge-flow-input').forEach(inp=>{
    inp.addEventListener('change', ev=>{
      const id=+ev.target.dataset.id;
      const ed=edges.find(e=>e.id===id);
      if(ed){ ed.flow=parseFloat(ev.target.value)||0; hodge(); draw(); }
    });
  });
  el.querySelectorAll('.edge-costval-input').forEach(inp=>{
    inp.addEventListener('change', ev=>{
      const id=+ev.target.dataset.id;
      const ed=edges.find(e=>e.id===id);
      if(ed){ ed.cost=parseFloat(ev.target.value)||0; draw(); }
    });
  });
  el.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', ev=>{
      const id=+ev.target.dataset.id;
      edges=edges.filter(e=>e.id!==id);
      updateEdgeList(); hodge(); draw();
    });
  });
}

// ─── Results UI ────────────────────────────────────────
function fmt(v){ return v.toFixed(3); }

function updateResults() {
  const rc=document.getElementById('result-content');
  if(!decomp||edges.length===0){
    rc.innerHTML='<span style="font-size:11px;color:var(--dim)">枝を追加すると分解が表示されます</span>';
    ['grad','curl','harm'].forEach(k=>{
      document.getElementById('bar-'+k).style.width='0%';
      document.getElementById('pct-'+k).textContent='—';
    });
    return;
  }
  const {f,fGrad,fCurl,fHarm,eTotal,eGrad,eCurl,eHarm}=decomp;
  const safe=eTotal<1e-12?1:eTotal;

  const mk=(cls,label,arr)=>`
    <div class="result-block">
      <div class="result-title ${cls}">${label}</div>
      ${edges.map((e,j)=>{
        const sn=nodes.find(n=>n.id===e.src),dn=nodes.find(n=>n.id===e.dst);
        return `<div class="result-row"><span>${sn?.label}→${dn?.label}</span><span class="result-val">${fmt(arr[j])}</span></div>`;
      }).join('')}
    </div>`;

  rc.innerHTML=mk('grad','▸ GRAD（勾配成分）',fGrad)+mk('curl','▸ CURL（回転成分）',fCurl)+mk('harm','▸ HARM（調和成分）',fHarm);

  const pct=v=>Math.min(100,Math.round(v/safe*100));
  document.getElementById('bar-grad').style.width=pct(eGrad)+'%';
  document.getElementById('bar-curl').style.width=pct(eCurl)+'%';
  document.getElementById('bar-harm').style.width=pct(eHarm)+'%';
  document.getElementById('pct-grad').textContent=pct(eGrad)+'%';
  document.getElementById('pct-curl').textContent=pct(eCurl)+'%';
  document.getElementById('pct-harm').textContent=pct(eHarm)+'%';
  renderMatDisplay();
}

// ─── Matrix / Laplacian display ────────────────────────
let matView = 'L';
function setMatView(v) {
  matView = v;
  ['L','B','phi'].forEach(k => {
    const b = document.getElementById('btn-show-'+k);
    if(b) b.classList.toggle('active', k===v);
  });
  renderMatDisplay();
}

function renderMatDisplay() {
  const wrap = document.getElementById('mat-display');
  const sub  = document.getElementById('mat-subtitle');
  if(!decomp || !decomp.L) {
    wrap.innerHTML='<span style="font-size:11px;color:var(--dim)">枝を追加すると表示されます</span>';
    sub.textContent=''; return;
  }
  const nLabels = nodes.map(n=>n.label);
  const eLabels = edges.map(e=>{
    const sn=nodes.find(n=>n.id===e.src), dn=nodes.find(n=>n.id===e.dst);
    return `${sn?.label||'?'}→${dn?.label||'?'}`;
  });

  if(matView==='L') {
    sub.textContent = `L[i,j]: 次数行列 − 隣接行列  (${nodes.length}×${nodes.length})`;
    wrap.innerHTML = renderMatrix(decomp.L, nLabels, nLabels, (v,i,j)=>{
      if(i===j) return 'var(--grad)';
      if(v!==0) return 'var(--curl)';
      return 'var(--dim)';
    });
  } else if(matView==='B') {
    sub.textContent = `B[v,e]: 境界作用素  (${nodes.length}×${edges.length})`;
    wrap.innerHTML = renderMatrix(decomp.B, nLabels, eLabels, (v)=>{
      if(v>0) return 'var(--accent)';
      if(v<0) return 'var(--grad)';
      return 'var(--dim)';
    });
  } else {
    // phi: vector
    sub.textContent = 'φ[v]: ノードポテンシャル (Lφ = div f)';
    const phi = decomp.phi;
    const max = Math.max(...phi.map(Math.abs), 1e-9);
    let html = `<table style="border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:10px;">`;
    phi.forEach((v,i)=>{
      const intensity = Math.abs(v)/max;
      const col = v>=0 ? `rgba(74,240,196,${0.3+0.7*intensity})` : `rgba(240,96,96,${0.3+0.7*intensity})`;
      html += `<tr>
        <td style="padding:2px 8px 2px 0;color:var(--dim)">${nLabels[i]}</td>
        <td style="padding:2px 4px;text-align:right;color:${col}">${v.toFixed(4)}</td>
        <td style="padding:2px 4px;width:80px;">
          <div style="background:var(--border);height:4px;width:100%;">
            <div style="background:${col};height:4px;width:${Math.round(intensity*100)}%;margin-left:${v<0?Math.round((1-intensity)*50)+'%':'0'}"></div>
          </div>
        </td>
      </tr>`;
    });
    html += '</table>';
    wrap.innerHTML = html;
  }
}

function renderMatrix(M, rowLabels, colLabels, colorFn) {
  const N = M.length, K = M[0]?.length || 0;
  // Cap display size to avoid overflow
  const maxCols = Math.min(K, 8);
  const cellW = Math.max(28, Math.floor(220 / (maxCols+1)));

  let html = `<div style="overflow-x:auto;"><table style="border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:9px;white-space:nowrap;">`;

  // Column headers
  html += '<tr><td style="padding:1px 4px;color:var(--border)">·</td>';
  for(let j=0;j<maxCols;j++){
    html += `<td style="padding:1px 4px;color:var(--dim);text-align:center;max-width:${cellW}px;overflow:hidden">${colLabels[j]||j}</td>`;
  }
  if(K>maxCols) html += `<td style="color:var(--dim);padding:1px 4px">…+${K-maxCols}</td>`;
  html += '</tr>';

  for(let i=0;i<N;i++){
    html += `<tr><td style="padding:1px 4px;color:var(--dim)">${rowLabels[i]||i}</td>`;
    for(let j=0;j<maxCols;j++){
      const v = M[i][j];
      const col = colorFn(v,i,j);
      const disp = Number.isInteger(v) ? v : v.toFixed(1);
      const bg = v!==0 ? 'rgba(255,255,255,0.03)' : 'transparent';
      html += `<td style="padding:1px 4px;text-align:right;color:${col};background:${bg};border:1px solid var(--border)">${disp}</td>`;
    }
    if(K>maxCols) html += `<td style="color:var(--dim);padding:1px 4px">…</td>`;
    html += '</tr>';
  }
  html += '</table></div>';
  return html;
}
function draw() {
  const W=canvas.width, H=canvas.height;
  const dpr=devicePixelRatio;
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.scale(dpr,dpr);
  const w=W/dpr, h=H/dpr;

  // Background grid
  ctx.strokeStyle='#13161e'; ctx.lineWidth=1;
  const gs=40;
  for(let x=0;x<w;x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(let y=0;y<h;y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

  // Draw triangles (2-simplices)
  if(decomp && decomp.triangles && decomp.triangles.length > 0){
    decomp.triangles.forEach(({a,b,c}) => {
      ctx.beginPath();
      ctx.moveTo(nodes[a].x, nodes[a].y);
      ctx.lineTo(nodes[b].x, nodes[b].y);
      ctx.lineTo(nodes[c].x, nodes[c].y);
      ctx.closePath();
      ctx.fillStyle='rgba(96,144,240,0.06)';
      ctx.fill();
    });
  }

  // Draw edges
  edges.forEach((e,j)=>{
    const sn=nodes.find(n=>n.id===e.src), dn=nodes.find(n=>n.id===e.dst);
    if(!sn||!dn) return;
    drawEdge(sn,dn,e,j);
  });

  // Edge being drawn
  if(edgeSrc&&mode==='edge'){
    ctx.setLineDash([4,4]);
    ctx.strokeStyle='var(--accent)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(edgeSrc.x,edgeSrc.y);
    const lx=lastMX||edgeSrc.x, ly=lastMY||edgeSrc.y;
    ctx.lineTo(lx,ly); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw nodes
  nodes.forEach(n=>{
    const isSelected = edgeSrc&&edgeSrc.id===n.id;
    ctx.beginPath();
    ctx.arc(n.x,n.y,14,0,Math.PI*2);
    ctx.fillStyle = isSelected ? 'rgba(74,240,196,0.25)' : '#1a1f2e';
    ctx.fill();
    ctx.strokeStyle = isSelected ? 'var(--accent)' : '#2a3048';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.stroke();

    // Node potential label
    let potLabel='';
    if(decomp){
      const ni=nodes.indexOf(n);
      potLabel=decomp.phi&&decomp.phi[ni]!==undefined ? `φ=${decomp.phi[ni].toFixed(1)}` : '';
    }

    ctx.fillStyle='#c8d0e0';
    ctx.font='bold 12px JetBrains Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.label,n.x,n.y);

    if(potLabel){
      ctx.font='9px JetBrains Mono, monospace';
      ctx.fillStyle='rgba(74,240,196,0.7)';
      ctx.fillText(potLabel,n.x,n.y+22);
    }
  });

  ctx.restore();
}

let lastMX=0, lastMY=0;
canvas.addEventListener('mousemove',e=>{
  const [x,y]=canvasXY(e);
  lastMX=x; lastMY=y;
  if(mode==='edge'&&edgeSrc) draw();
});

function drawEdge(sn, dn, e, j) {
  const dx=dn.x-sn.x, dy=dn.y-sn.y;
  const len=Math.hypot(dx,dy); if(len<1) return;
  const ux=dx/len, uy=dy/len;
  const NR=16; // node radius
  const sx=sn.x+ux*NR, sy=sn.y+uy*NR;
  const ex=dn.x-ux*NR, ey=dn.y-uy*NR;

  // Check if reverse edge exists → offset
  const hasRev = edges.some(r=>r.src===e.dst&&r.dst===e.src&&r.id!==e.id);
  const off=hasRev?8:0;
  const nx=-uy*off, ny=ux*off;

  // Color by dominant component
  let color='#2a3048';
  if(decomp){
    const g=Math.abs(decomp.fGrad[j]);
    const c=Math.abs(decomp.fCurl[j]);
    const h=Math.abs(decomp.fHarm[j]);
    const mx=Math.max(g,c,h,0.001);
    if(mx===g) color='rgba(240,96,96,0.85)';
    else if(mx===c) color='rgba(96,144,240,0.85)';
    else color='rgba(240,192,64,0.85)';
  }

  // Line width by flow magnitude
  const flowAbs=Math.abs(e.flow);
  const lw=Math.max(1,Math.min(6,1+flowAbs*0.6));

  ctx.beginPath();
  ctx.moveTo(sx+nx,sy+ny);
  ctx.lineTo(ex+nx,ey+ny);
  ctx.strokeStyle=color;
  ctx.lineWidth=lw;
  ctx.stroke();

  // Arrow
  const arrowLen=10, arrowW=5;
  const mx2=(sx+ex)/2+nx, my2=(sy+ey)/2+ny;
  ctx.beginPath();
  ctx.moveTo(mx2+ux*arrowLen, my2+uy*arrowLen);
  ctx.lineTo(mx2-ux*arrowLen+uy*arrowW, my2-uy*arrowLen-ux*arrowW);
  ctx.lineTo(mx2-ux*arrowLen-uy*arrowW, my2-uy*arrowLen+ux*arrowW);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();

  // Flow + cost label
  const lx2=(sx+ex)/2+nx-uy*16, ly2=(sy+ey)/2+ny+ux*16;
  ctx.font='10px JetBrains Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(200,208,224,0.9)';
  const costVal = e.cost ?? e.flow;
  const hasCost = Math.abs(costVal - e.flow) > 1e-6;
  if(hasCost){
    ctx.fillText(`f=${e.flow.toFixed(1)}`, lx2, ly2-6);
    ctx.fillStyle='rgba(240,192,64,0.8)';
    ctx.fillText(`c=${costVal.toFixed(1)}`, lx2, ly2+6);
  } else {
    ctx.fillText(e.flow.toFixed(1), lx2, ly2);
  }

  // Decomp mini-bars under edge midpoint (if decomp)
  if(decomp){
    const bx=(sx+ex)/2+nx, by=(sy+ey)/2+ny;
    const total=Math.abs(decomp.fGrad[j])+Math.abs(decomp.fCurl[j])+Math.abs(decomp.fHarm[j])||1;
    const bw=36, bh=4;
    let cx2=bx-bw/2;
    const parts=[
      [decomp.fGrad[j],'rgba(240,96,96,0.7)'],
      [decomp.fCurl[j],'rgba(96,144,240,0.7)'],
      [decomp.fHarm[j],'rgba(240,192,64,0.7)']
    ];
    const by2=by+10;
    parts.forEach(([v,col])=>{
      const pw=Math.abs(v)/total*bw;
      ctx.fillStyle=col;
      ctx.fillRect(cx2,by2,pw,bh);
      cx2+=pw;
    });
  }
}

// ─── Init ──────────────────────────────────────────────
resize();
loadPreset('triangle');
</script>
</body>
</html>
